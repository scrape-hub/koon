name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v0.5.3)"
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ─── Node.js binary (Windows x64) ───────────────────────────────────
  build-node-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - uses: ./.github/actions/setup-windows

      - name: Build
        run: cargo build --release -p koon-node --target x86_64-pc-windows-msvc

      - name: Rename node binary
        shell: bash
        run: |
          cp "target/x86_64-pc-windows-msvc/release/koon_node.dll" \
             "crates/node/koon.win32-x64-msvc.node"

      - name: Upload node artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-x86_64-pc-windows-msvc
          path: crates/node/koon.win32-x64-msvc.node

  # ─── Node.js binary (Linux x64) ─────────────────────────────────────
  build-node-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential

      - name: Build
        run: cargo build --release -p koon-node --target x86_64-unknown-linux-gnu

      - name: Rename node binary
        run: |
          cp "target/x86_64-unknown-linux-gnu/release/libkoon_node.so" \
             "crates/node/koon.linux-x64-gnu.node"

      - name: Upload node artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-x86_64-unknown-linux-gnu
          path: crates/node/koon.linux-x64-gnu.node

  # ─── Node.js binary (macOS arm64 / Apple Silicon) ──────────────────
  build-node-macos-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Build
        run: cargo build --release -p koon-node --target aarch64-apple-darwin

      - name: Rename node binary
        run: |
          cp "target/aarch64-apple-darwin/release/libkoon_node.dylib" \
             "crates/node/koon.darwin-arm64.node"

      - name: Upload node artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-aarch64-apple-darwin
          path: crates/node/koon.darwin-arm64.node

  # ─── Node.js binary (macOS x64 / Intel) ───────────────────────────
  build-node-macos-x64:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Build
        run: cargo build --release -p koon-node --target x86_64-apple-darwin

      - name: Rename node binary
        run: |
          cp "target/x86_64-apple-darwin/release/libkoon_node.dylib" \
             "crates/node/koon.darwin-x64.node"

      - name: Upload node artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-x86_64-apple-darwin
          path: crates/node/koon.darwin-x64.node

  # ─── Python wheel (Windows x64) ─────────────────────────────────────
  build-python-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: ./.github/actions/setup-windows

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: x86_64-pc-windows-msvc
          args: --release --out dist --find-interpreter --manifest-path crates/python/Cargo.toml

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-x86_64-pc-windows-msvc
          path: dist/*.whl

  # ─── Python wheel (Linux x64, manylinux) ────────────────────────────
  build-python-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: x86_64
          args: --release --out dist --find-interpreter --manifest-path crates/python/Cargo.toml
          before-script-linux: |
            if command -v yum &>/dev/null; then
              yum install -y llvm-toolset-7.0-clang-devel || yum install -y clang-devel || true
              source /opt/rh/llvm-toolset-7.0/enable 2>/dev/null || true
            elif command -v apt-get &>/dev/null; then
              apt-get update && apt-get install -y libclang-dev
            fi
            curl -sL https://go.dev/dl/go1.24.1.linux-amd64.tar.gz | tar -C /usr/local -xzf -
            export PATH=$PATH:/usr/local/go/bin
          manylinux: auto

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-x86_64-unknown-linux-gnu
          path: dist/*.whl

  # ─── CLI binary (Windows x64) ──────────────────────────────────────
  build-cli-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - uses: ./.github/actions/setup-windows

      - name: Build
        run: cargo build --release -p koon-cli --target x86_64-pc-windows-msvc

      - name: Rename CLI binary
        shell: bash
        run: cp "target/x86_64-pc-windows-msvc/release/koon.exe" koon-windows-x64.exe

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-x86_64-pc-windows-msvc
          path: koon-windows-x64.exe

  # ─── CLI binary (Linux x64) ───────────────────────────────────────
  build-cli-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential

      - name: Build
        run: cargo build --release -p koon-cli --target x86_64-unknown-linux-gnu

      - name: Rename CLI binary
        run: cp "target/x86_64-unknown-linux-gnu/release/koon" koon-linux-x64

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-x86_64-unknown-linux-gnu
          path: koon-linux-x64

  # ─── CLI binary (macOS arm64 / Apple Silicon) ─────────────────────
  build-cli-macos-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Build
        run: cargo build --release -p koon-cli --target aarch64-apple-darwin

      - name: Rename CLI binary
        run: cp "target/aarch64-apple-darwin/release/koon" koon-macos-arm64

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-aarch64-apple-darwin
          path: koon-macos-arm64

  # ─── CLI binary (macOS x64 / Intel) ──────────────────────────────
  build-cli-macos-x64:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Build
        run: cargo build --release -p koon-cli --target x86_64-apple-darwin

      - name: Rename CLI binary
        run: cp "target/x86_64-apple-darwin/release/koon" koon-macos-x64

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-x86_64-apple-darwin
          path: koon-macos-x64

  # ─── Python source distribution ────────────────────────────────────
  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist --manifest-path crates/python/Cargo.toml

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  # ─── Publish to npm ─────────────────────────────────────────────────
  publish-npm:
    needs: [build-node-windows, build-node-linux, build-node-macos-arm64, build-node-macos-x64]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: https://registry.npmjs.org

      - name: Download node artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: node-*
          path: artifacts/
          merge-multiple: true

      - name: List binaries
        run: ls -la artifacts/

      - name: Publish platform packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cp artifacts/koon.win32-x64-msvc.node crates/node/npm/win32-x64-msvc/
          cp artifacts/koon.linux-x64-gnu.node crates/node/npm/linux-x64-gnu/
          cp artifacts/koon.darwin-arm64.node crates/node/npm/darwin-arm64/
          cp artifacts/koon.darwin-x64.node crates/node/npm/darwin-x64/
          for dir in crates/node/npm/*/; do
            echo "Publishing $(basename $dir)..."
            npm publish "$dir" --access public
          done

      - name: Publish main package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
        working-directory: crates/node

  # ─── Publish to PyPI ────────────────────────────────────────────────
  publish-pypi:
    needs: [build-python-windows, build-python-linux, sdist]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install maturin
        run: pip install maturin

      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist/
          merge-multiple: true

      - name: Download sdist
        uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist/

      - name: List artifacts
        run: ls -la dist/

      - name: Publish to PyPI
        run: maturin upload --non-interactive --skip-existing dist/*
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}

  # ─── GitHub Release with binaries ───────────────────────────────────
  publish-github:
    needs: [build-node-windows, build-node-linux, build-node-macos-arm64, build-node-macos-x64, build-python-windows, build-python-linux, build-cli-windows, build-cli-linux, build-cli-macos-arm64, build-cli-macos-x64, sdist]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Collect release files
        run: |
          mkdir -p release-files
          cp artifacts/node-*/*.node release-files/
          cp artifacts/cli-*/* release-files/
          cp artifacts/wheels-*/*.whl release-files/
          cp artifacts/sdist/*.tar.gz release-files/
          ls -la release-files/

      - name: Determine tag
        id: tag
        run: echo "name=${{ inputs.tag || github.ref_name }}" >> $GITHUB_OUTPUT

      - name: Delete existing release (if re-releasing)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release delete ${{ steps.tag.outputs.name }} --yes --cleanup-tag=false 2>/dev/null || true

      - name: Create GitHub Release with assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create ${{ steps.tag.outputs.name }} release-files/* --generate-notes
