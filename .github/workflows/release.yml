name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ─── Node.js binary (Windows x64 only for now) ──────────────────────
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - uses: ./.github/actions/setup-windows

      - name: Build
        run: cargo build --release -p koon-node --target x86_64-pc-windows-msvc

      - name: Rename node binary
        shell: bash
        run: |
          cp "target/x86_64-pc-windows-msvc/release/koon_node.dll" \
             "crates/node/koon.win32-x64-msvc.node"

      - name: Upload node artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-x86_64-pc-windows-msvc
          path: crates/node/koon.win32-x64-msvc.node

  # ─── Python wheel (Windows x64 only for now) ────────────────────────
  build-python:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-windows

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: x86_64-pc-windows-msvc
          args: --release --out dist --find-interpreter --manifest-path crates/python/Cargo.toml

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-x86_64-pc-windows-msvc
          path: dist/*.whl

  # ─── Python source distribution ────────────────────────────────────
  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist --manifest-path crates/python/Cargo.toml

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  # ─── Publish to npm ─────────────────────────────────────────────────
  publish-npm:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: https://registry.npmjs.org

      - name: Download node artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: node-*
          path: crates/node/
          merge-multiple: true

      - name: List binaries
        run: ls -la crates/node/*.node

      - name: Publish to npm
        run: npm publish --access public
        working-directory: crates/node
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ─── Publish to PyPI ────────────────────────────────────────────────
  publish-pypi:
    needs: [build-python, sdist]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install maturin
        run: pip install maturin

      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist/
          merge-multiple: true

      - name: Download sdist
        uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist/

      - name: List artifacts
        run: ls -la dist/

      - name: Publish to PyPI
        run: maturin upload --non-interactive --skip-existing dist/*
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}

  # ─── GitHub Release (changelog marker, no binaries) ────────────────
  publish-github:
    needs: [build, build-python]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Delete existing release (if re-releasing)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release delete ${{ github.ref_name }} --yes --cleanup-tag=false 2>/dev/null || true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create ${{ github.ref_name }} --generate-notes
