name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ─── Node.js + CLI binaries ─────────────────────────────────────────
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            node-file: koon.win32-x64-msvc.node
            cli-file: koon-x86_64-pc-windows-msvc.exe
            lib-prefix: ""
            lib-ext: dll
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            node-file: koon.linux-x64-gnu.node
            cli-file: koon-x86_64-unknown-linux-gnu
            lib-prefix: lib
            lib-ext: so
          # ARM64 + macOS builds commented out to save CI minutes — re-enable when needed
          # - target: aarch64-unknown-linux-gnu
          #   runner: ubuntu-latest
          #   node-file: koon.linux-arm64-gnu.node
          #   cli-file: koon-aarch64-unknown-linux-gnu
          #   lib-prefix: lib
          #   lib-ext: so
          # - target: x86_64-apple-darwin
          #   runner: macos-15
          #   node-file: koon.darwin-x64.node
          #   cli-file: koon-x86_64-apple-darwin
          #   lib-prefix: lib
          #   lib-ext: dylib
          # - target: aarch64-apple-darwin
          #   runner: macos-14
          #   node-file: koon.darwin-arm64.node
          #   cli-file: koon-aarch64-apple-darwin
          #   lib-prefix: lib
          #   lib-ext: dylib

    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Setup MSVC Enterprise (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Find Enterprise explicitly (skip broken BuildTools)
          $vsPath = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" `
            -products 'Microsoft.VisualStudio.Product.Enterprise' `
            -latest -property installationPath
          if (-not $vsPath) { throw "VS Enterprise not found" }

          # Capture env before vcvarsall
          $before = @{}
          cmd /c set 2>$null | ForEach-Object {
            if ($_ -match '^([^=]+)=(.*)$') { $before[$matches[1]] = $matches[2] }
          }

          # Run Enterprise vcvars64 and capture env diff
          $vcvars = Join-Path $vsPath 'VC\Auxiliary\Build\vcvars64.bat'
          cmd /c "`"$vcvars`" >nul 2>&1 && set" | ForEach-Object {
            if ($_ -match '^([^=]+)=(.*)$') {
              $k = $matches[1]; $v = $matches[2]
              if ($before[$k] -ne $v) {
                if ($k -ieq 'Path') {
                  $v.Split(';') | Where-Object { $_ -and -not $before['Path'].Contains($_) } |
                    ForEach-Object { echo $_ >> $env:GITHUB_PATH }
                } else {
                  echo "$k=$v" >> $env:GITHUB_ENV
                }
              }
            }
          }

          # Explicit linker override for Cargo (bypasses rustc's own vswhere detection)
          $toolsDir = Get-ChildItem "$vsPath\VC\Tools\MSVC" -Directory |
            Sort-Object Name -Descending | Select-Object -First 1
          $linker = Join-Path $toolsDir.FullName 'bin\Hostx64\x64\link.exe'
          echo "CARGO_TARGET_X86_64_PC_WINDOWS_MSVC_LINKER=$linker" >> $env:GITHUB_ENV
          Write-Host "VS Enterprise: $vsPath"
          Write-Host "Linker: $linker (exists: $(Test-Path $linker))"

      - name: Install NASM (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/setup-nasm@v1

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y crossbuild-essential-arm64

      - name: Set cross-compilation env (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          echo "CC=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "CXX=aarch64-linux-gnu-g++" >> $GITHUB_ENV
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build
        run: cargo build --release -p koon-node -p koon-cli --target ${{ matrix.target }}

      - name: Rename node binary
        shell: bash
        run: |
          cp "target/${{ matrix.target }}/release/${{ matrix.lib-prefix }}koon_node.${{ matrix.lib-ext }}" \
             "crates/node/${{ matrix.node-file }}"

      - name: Rename CLI binary
        shell: bash
        run: |
          cp "target/${{ matrix.target }}/release/koon$([ '${{ runner.os }}' = 'Windows' ] && echo '.exe')" \
             "${{ matrix.cli-file }}"

      - name: Upload node artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-${{ matrix.target }}
          path: crates/node/${{ matrix.node-file }}

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.target }}
          path: ${{ matrix.cli-file }}

  # ─── Python wheels ─────────────────────────────────────────────────
  build-python:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          # - target: aarch64-unknown-linux-gnu
          #   runner: ubuntu-latest
          # macOS builds commented out to save CI minutes — re-enable when needed
          # - target: x86_64-apple-darwin
          #   runner: macos-15
          # - target: aarch64-apple-darwin
          #   runner: macos-14

    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSVC Enterprise (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $vsPath = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" `
            -products 'Microsoft.VisualStudio.Product.Enterprise' `
            -latest -property installationPath
          if (-not $vsPath) { throw "VS Enterprise not found" }
          $before = @{}
          cmd /c set 2>$null | ForEach-Object {
            if ($_ -match '^([^=]+)=(.*)$') { $before[$matches[1]] = $matches[2] }
          }
          $vcvars = Join-Path $vsPath 'VC\Auxiliary\Build\vcvars64.bat'
          cmd /c "`"$vcvars`" >nul 2>&1 && set" | ForEach-Object {
            if ($_ -match '^([^=]+)=(.*)$') {
              $k = $matches[1]; $v = $matches[2]
              if ($before[$k] -ne $v) {
                if ($k -ieq 'Path') {
                  $v.Split(';') | Where-Object { $_ -and -not $before['Path'].Contains($_) } |
                    ForEach-Object { echo $_ >> $env:GITHUB_PATH }
                } else {
                  echo "$k=$v" >> $env:GITHUB_ENV
                }
              }
            }
          }
          $toolsDir = Get-ChildItem "$vsPath\VC\Tools\MSVC" -Directory |
            Sort-Object Name -Descending | Select-Object -First 1
          $linker = Join-Path $toolsDir.FullName 'bin\Hostx64\x64\link.exe'
          echo "CARGO_TARGET_X86_64_PC_WINDOWS_MSVC_LINKER=$linker" >> $env:GITHUB_ENV
          Write-Host "VS Enterprise: $vsPath  Linker exists: $(Test-Path $linker)"

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install NASM (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/setup-nasm@v1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Linux: maturin + zig for manylinux-compliant wheels (no Docker needed)
      - name: Install Rust (Linux)
        if: runner.os == 'Linux'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build wheels (Linux)
        if: runner.os == 'Linux'
        run: |
          pip install 'maturin[zig]'
          maturin build --release --out dist --find-interpreter \
            --manifest-path crates/python/Cargo.toml \
            --target ${{ matrix.target }} \
            --zig --compatibility manylinux_2_28

      # macOS/Windows: maturin-action (handles Rust install internally)
      - name: Build wheels (macOS/Windows)
        if: runner.os != 'Linux'
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --find-interpreter --manifest-path crates/python/Cargo.toml

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.target }}
          path: dist/*.whl

  # ─── Python source distribution ────────────────────────────────────
  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist --manifest-path crates/python/Cargo.toml

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  # ─── Publish to npm ─────────────────────────────────────────────────
  publish-npm:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: https://registry.npmjs.org

      - name: Download all node artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: node-*
          path: crates/node/
          merge-multiple: true

      - name: List binaries
        run: ls -la crates/node/*.node

      - name: Publish to npm
        run: npm publish --access public
        working-directory: crates/node
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ─── Publish to PyPI ────────────────────────────────────────────────
  publish-pypi:
    needs: [build-python, sdist]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install maturin
        run: pip install maturin

      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist/
          merge-multiple: true

      - name: Download sdist
        uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist/

      - name: List artifacts
        run: ls -la dist/

      - name: Publish to PyPI
        run: maturin upload --non-interactive --skip-existing dist/*
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}

  # ─── GitHub Release with CLI binaries ───────────────────────────────
  publish-github:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all CLI artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: cli-*
          path: cli-binaries/
          merge-multiple: true

      - name: List binaries
        run: ls -la cli-binaries/

      - name: Delete existing release (if re-releasing)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release delete ${{ github.ref_name }} --yes --cleanup-tag=false 2>/dev/null || true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create ${{ github.ref_name }} cli-binaries/* --generate-notes
