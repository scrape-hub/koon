name: Build macOS arm64

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-node-macos-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          registry-url: https://registry.npmjs.org

      - name: Build
        run: cargo build --release -p koon-node --target aarch64-apple-darwin

      - name: Rename node binary
        run: |
          cp "target/aarch64-apple-darwin/release/libkoon_node.dylib" \
             koon.darwin-arm64.node

      - name: Upload to v0.6.0 release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload v0.6.1 koon.darwin-arm64.node --clobber

      - name: Publish platform package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cp koon.darwin-arm64.node crates/node/npm/darwin-arm64/
          npm publish crates/node/npm/darwin-arm64/ --access public
